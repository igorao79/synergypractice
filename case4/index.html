<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кейс 4 — Калькулятор</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(124, 58, 237, 0.5); }

        body {
            min-height: 100vh;
            background: #0a0e1a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb-1 {
            width: 380px; height: 380px;
            background: rgba(124, 58, 237, 0.15);
            top: -100px; right: -100px;
            animation: float 9s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 300px; height: 300px;
            background: rgba(6, 182, 212, 0.1);
            bottom: -80px; left: -80px;
            animation: float 11s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            display: inline-flex; align-items: center; gap: 6px;
            color: #94a3b8; text-decoration: none; font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: #c084fc; }

        .container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 92vw;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.3);
            border-radius: 20px;
            padding: 36px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #c084fc, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 28px;
        }

        .inputs-row {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
        }

        .input-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .inputs-row input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 10px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: right;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .inputs-row input:focus {
            border-color: rgba(124, 58, 237, 0.5);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }
        .inputs-row input::placeholder { color: #334155; }

        .op-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 22px;
        }

        .op-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        .op-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
        }
        .op-btn:active { transform: translateY(0); filter: brightness(0.95); }

        .op-sym {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            font-weight: 700;
            opacity: 0.85;
        }

        .result-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.3);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 20px;
            min-height: 84px;
        }

        .equation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #64748b;
            text-align: right;
            min-height: 18px;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #22d3ee;
            text-align: right;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
            transition: color 0.25s, text-shadow 0.25s, font-size 0.25s;
            word-break: break-word;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .result-value.error {
            color: #f87171;
            font-size: 1rem;
            text-shadow: 0 0 16px rgba(248, 113, 113, 0.25);
        }

        .clear-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid rgba(51, 65, 85, 0.4);
            border-radius: 10px;
            color: #64748b;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .clear-btn:hover { color: #f87171; border-color: rgba(248, 113, 113, 0.35); }
    </style>
</head>
<body>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <a href="../index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Назад
    </a>

    <div class="container">
        <div class="card">
            <h1>Калькулятор</h1>
            <p class="desc">Введите два числа и выберите операцию</p>

            <div class="inputs-row">
                <div class="input-wrap">
                    <label>Число 1</label>
                    <input type="text" id="n1" placeholder="0" inputmode="decimal">
                </div>
                <div class="input-wrap">
                    <label>Число 2</label>
                    <input type="text" id="n2" placeholder="0" inputmode="decimal">
                </div>
            </div>

            <div class="op-grid">
                <button class="op-btn" onclick="go('add')"><span class="op-sym">+</span>Сумма</button>
                <button class="op-btn" onclick="go('sub')"><span class="op-sym">−</span>Разность</button>
                <button class="op-btn" onclick="go('mul')"><span class="op-sym">×</span>Произведение</button>
                <button class="op-btn" onclick="go('div')"><span class="op-sym">÷</span>Деление</button>
            </div>

            <div class="result-box">
                <div class="equation" id="equation"></div>
                <div class="result-value" id="res">0</div>
            </div>

            <button class="clear-btn" onclick="clr()">ОЧИСТИТЬ</button>
        </div>
    </div>

    <script>
    const ops = { add: '+', sub: '−', mul: '×', div: '÷' };

    function go(o) {
        const v1 = document.getElementById('n1').value;
        const v2 = document.getElementById('n2').value;
        const eq = document.getElementById('equation');
        const r = document.getElementById('res');
        const sym = ops[o];

        const a = parseFloat(v1), b = parseFloat(v2);
        if (isNaN(a) || isNaN(b) || !v1.trim() || !v2.trim()) {
            eq.textContent = '';
            r.textContent = 'Ошибка: введите числа!';
            r.classList.add('error');
            return;
        }

        if (o === 'div' && b === 0) {
            eq.textContent = `${v1} ${sym} ${v2} =`;
            r.textContent = 'Деление на ноль!';
            r.classList.add('error');
            return;
        }

        let x;
        if (o === 'add') x = a + b;
        else if (o === 'sub') x = a - b;
        else if (o === 'mul') x = a * b;
        else x = a / b;

        eq.textContent = `${v1} ${sym} ${v2} =`;
        r.classList.remove('error');
        r.textContent = Math.round(x * 1000000) / 1000000;
    }

    function clr() {
        document.getElementById('n1').value = '';
        document.getElementById('n2').value = '';
        document.getElementById('equation').textContent = '';
        document.getElementById('res').textContent = '0';
        document.getElementById('res').classList.remove('error');
    }
    </script>
</body>
</html>
